name: Broken-link monitor (Lychee)

# Why this exists:
# - publish-gate catches broken internal links at commit time (in-PR).
# - Lychee runs continuously and catches links that BREAK AFTER the
#   commit lands — Amazon products go out of stock, third-party guides
#   move, source domains expire.
# - Free, fast, runs in 30s for the whole site.

on:
  # Run AFTER Vercel finishes deploying — NOT on push.
  #
  # ROOT CAUSE of the recurring false-positive failures: the old `push` trigger
  # ran Lychee ~10s after merge, checking links against the LIVE site before
  # Vercel had deployed the new pages (deploys take 1-3 min). Any push that
  # added a new page another file linked to would 404 transiently — a race
  # between the link-checker and the deploy, not a real broken link.
  #
  # `deployment_status` fires once Vercel reports the deploy succeeded, so the
  # live site is guaranteed up to date when Lychee runs. The race cannot happen.
  deployment_status:
  schedule:
    # Sundays 03:00 UTC — weekly catch-all for external link rot
    - cron: '0 3 * * 0'
  # Manual run from Actions tab when needed
  workflow_dispatch:

jobs:
  link-check:
    # Only run for a SUCCESSFUL PRODUCTION deploy (the live site is now updated),
    # or on the weekly schedule / manual dispatch. Skips preview deploys and the
    # pending/in-progress/failed deployment statuses Vercel also emits.
    if: >-
      github.event_name != 'deployment_status' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment_status.environment == 'Production')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6

      # Per-commit, per-run cache key — every run gets a fresh cache window.
      # Stops stale 404s persisting after a redirect/rename ships. The
      # restore-key fallback still lets long-lived caches accelerate runs.
      - name: Restore lychee cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}-${{ github.run_id }}
          restore-keys: |
            cache-lychee-${{ github.sha }}-
            cache-lychee-

      - name: Run Lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Config:
          #   --cache: re-use prior responses (much faster)
          #   --max-cache-age 12h: refresh twice-daily (was 1d, cut for faster
          #     drift detection + paired with per-commit cache key above)
          #   --no-progress: cleaner CI logs
          #   --verbose: show what's being checked
          #   --include-fragments: catch #anchor breaks too
          #   --base: resolve root-relative links (/shop/foo) against production URL
          #   --timeout 30: some UK supplier sites are slow on first hit
          #   --max-redirects 5: follow normal redirect chains (Pinterest etc.)
          #   --accept 200..=299,308,403,429: 308 = permanent redirect, accepted
          #     so next.config.ts redirects pass without forcing a follow chain;
          #     403/429 = bot-blocking, not broken
          #   --exclude: Amazon, social platforms, mailto/tel, template-literal placeholders
          #
          # Scope: only MDX (editorial content — where links matter to readers).
          # We deliberately DO NOT scan app/**/*.tsx or data/**/*.ts because
          # they contain template-literal URL strings (`${slug}`, `${WHATSAPP_NUMBER}`)
          # that produce permanent false positives — those routes are validated
          # at build-time by Next.js + tested via the sitemap separately.
          args: >-
            --cache
            --max-cache-age 12h
            --no-progress
            --verbose
            --include-fragments
            --base 'https://tileflowuk.com'
            --timeout 30
            --max-redirects 5
            --accept '200..=299,308,403,429'
            --exclude '^https?://(www\.)?(amazon\.|amzn\.)'
            --exclude '^https?://(www\.)?(linkedin\.|x\.com|twitter\.)'
            --exclude '^mailto:'
            --exclude '^tel:'
            --exclude '^https?://localhost'
            './content/**/*.mdx'
          fail: true
          format: markdown
          output: ./lychee/out.md
          token: ${{ secrets.GITHUB_TOKEN }}

      # File an issue when a REAL broken link is found — either post-deploy
      # (a link that broke in freshly-shipped content) or on the weekly run
      # (external link rot). Skipped on manual dispatch to avoid noise while
      # testing. Now that the deploy race is gone, a failure here is genuine.
      - name: Create issue from broken-link report
        if: failure() && github.event_name != 'workflow_dispatch'
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: 'Broken-link monitor: report'
          content-filepath: ./lychee/out.md
          labels: broken-links, automated
