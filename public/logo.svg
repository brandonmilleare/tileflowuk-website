<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">TileFlow UK redesigned logo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Elegant minimal logo for TileFlow UK with geometric tile mark and serif typography</desc>

  <defs>
    
  </defs>

  <!-- Geometric tile mark — 4-tile grid with offset pattern -->
  <!-- Top-left tile: outline -->
  <rect x="228" y="96" width="42" height="42" fill="none" stroke="#c8c4bc" stroke-width="0.8" style="fill:none;stroke:rgb(200, 196, 188);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Top-right tile: filled warm stone -->
  <rect x="274" y="96" width="42" height="42" fill="#d4cfc6" stroke="#c8c4bc" stroke-width="0.8" style="fill:rgb(58, 56, 53);stroke:rgb(200, 196, 188);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Bottom-left tile: filled warm stone -->
  <rect x="228" y="142" width="42" height="42" fill="#d4cfc6" stroke="#c8c4bc" stroke-width="0.8" style="fill:rgb(58, 56, 53);stroke:rgb(200, 196, 188);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Bottom-right tile: outline -->
  <rect x="274" y="142" width="42" height="42" fill="none" stroke="#c8c4bc" stroke-width="0.8" style="fill:none;stroke:rgb(200, 196, 188);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Small accent square — inset detail top-left tile -->
  <rect x="236" y="104" width="8" height="8" fill="#b0aba0" style="fill:rgb(160, 152, 136);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Brand name -->
  <text x="340" y="155" text-anchor="start" style="fill:rgb(0,0,0);stroke:none;font-family:&quot;Cormorant Garamond&quot;, Georgia, serif;font-size:52px;font-weight:300;text-anchor:start;dominant-baseline:auto">TileFlow</text>

  <!-- UK superscript-style -->
  <text x="591" y="127" text-anchor="start" font-family="'Raleway', sans-serif" font-weight="400" font-size="15" fill="#000000" letter-spacing="2" style="letter-spacing:3px;fill:rgb(0,0,0);stroke:none;font-family:Raleway, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">UK</text>

  <!-- Thin rule -->
  <line x1="340" y1="172" x2="634" y2="172" stroke="#1a1a1a" stroke-width="0.6" style="fill:none;stroke:rgb(26,26,26);stroke-width:0.6px;"/>

  <!-- Tagline -->
  <text x="487" y="188" text-anchor="middle" style="fill:rgb(60,60,60);stroke:none;font-family:Raleway, sans-serif;font-size:10px;font-weight:300;text-anchor:middle;dominant-baseline:auto">ELEVATE EVERY SURFACE</text>
</svg>