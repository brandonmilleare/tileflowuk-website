# Vale config — enforces TileFlow brand voice on content prose.
# Scoped to blog/guide/best-of MDX content only (not code or component JSX).
# Rules live in styles/TileFlow/. Run locally: `vale content/`
StylesPath = styles
MinAlertLevel = suggestion

# Only lint the prose content, not the app code.
[content/**/*.{md,mdx}]
BasedOnStyles = TileFlow
